<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Urlaubscheckliste</title>

  <!-- PWA: Manifest & Icons -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Urlaub">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      background: #f0f0f0;
    }
    h1, h2 {
      color: #2c3e50;
    }
    .section {
      margin-bottom: 25px;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
      page-break-inside: avoid;
    }
    .checkbox-group label {
      display: block;
      margin-bottom: 5px;
    }
    .freitext-container {
      margin-top: 10px;
    }
    .freitext-container .freitext-wrapper {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
    }
    .freitext-container input[type="text"] {
      flex: 1;
    }
    .buttons {
      margin-top: 10px;
    }
    button {
      padding: 8px 14px;
      margin-right: 5px;
      margin-top: 5px;
      border: none;
      background: #2c3e50;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #1a252f;
    }
    @media (max-width: 600px) {
      input[type="text"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>🧳 Urlaubscheckliste</h1>
  <div id="checklist">

    <!-- KOSMETIK -->
    <div class="section" data-section="Kosmetik">
      <h2>Kosmetik</h2>
      <div class="checkbox-group">
        <label><input type="checkbox"> Zahnbürste</label>
        <label><input type="checkbox"> Zahnpasta</label>
        <label><input type="checkbox"> Parfüm</label>
        <label><input type="checkbox"> Haarshampoo</label>
        <label><input type="checkbox"> Deo</label>
        <label><input type="checkbox"> Haarschaum</label>
        <label><input type="checkbox"> Duschgel</label>
        <label><input type="checkbox"> Fön</label>
        <label><input type="checkbox"> Haarspray</label>
        <label><input type="checkbox"> Taschentücher</label>
        <label><input type="checkbox"> Ohrenstäbchen</label>
        <label><input type="checkbox"> Bürste</label>
        <label><input type="checkbox"> Sonnenmilch</label>
        <label><input type="checkbox"> Gesichtscreme</label>
        <label><input type="checkbox"> After-Sun</label>
        <label><input type="checkbox"> Bodylotion</label>
        <label><input type="checkbox"> Rasierer</label>
        <label><input type="checkbox"> Aftershave Lotion</label>
      </div>
      <div class="freitext-container" id="kosmetik-freitext"></div>
      <div class="buttons">
        <button onclick="addField('kosmetik-freitext')">+ Freitext</button>
      </div>
    </div>

    <!-- REISEAPOTHEKE -->
    <div class="section" data-section="Reiseapotheke">
      <h2>Reiseapotheke</h2>
      <div class="checkbox-group">
        <label><input type="checkbox"> Desinfektionsmittel</label>
        <label><input type="checkbox"> Schere</label>
        <label><input type="checkbox"> Magnesium</label>
        <label><input type="checkbox"> Durchfalltabletten</label>
        <label><input type="checkbox"> Wundsalbe</label>
        <label><input type="checkbox"> Diclofenac</label>
        <label><input type="checkbox"> Pinzette</label>
        <label><input type="checkbox"> Kortisonsalbe</label>
        <label><input type="checkbox"> Kopfschmerztabletten</label>
        <label><input type="checkbox"> Pflaster</label>
        <label><input type="checkbox"> Bullrich Salz</label>
        <label><input type="checkbox"> Pantoprazol</label>
      </div>
      <div class="freitext-container" id="apotheke-freitext"></div>
      <div class="buttons">
        <button onclick="addField('apotheke-freitext')">+ Freitext</button>
      </div>
    </div>

    <!-- KLEIDUNG -->
    <div class="section" data-section="Kleidung">
      <h2>Kleidung</h2>
      <div class="checkbox-group">
        <label><input type="checkbox"> Slips</label>
        <label><input type="checkbox"> Badehose</label>
        <label><input type="checkbox"> Einlagen</label>
        <label><input type="checkbox"> Socken</label>
        <label><input type="checkbox"> Cappy</label>
        <label><input type="checkbox"> Schlafsachen</label>
        <label><input type="checkbox"> Sandalen</label>
        <label><input type="checkbox"> 1 lange Hose</label>
        <label><input type="checkbox"> T-Shirts</label>
        <label><input type="checkbox"> Hoodie</label>
        <label><input type="checkbox"> Flip-Flops</label>
        <label><input type="checkbox"> Shorts</label>
        <label><input type="checkbox"> Schuhe</label>
      </div>
      <div class="freitext-container" id="kleidung-freitext"></div>
      <div class="buttons">
        <button onclick="addField('kleidung-freitext')">+ Freitext</button>
      </div>
    </div>

    <!-- SONSTIGES -->
    <div class="section" data-section="Sonstiges">
      <h2>Sonstiges</h2>
      <div class="checkbox-group">
        <label><input type="checkbox"> Reisepass / Personalausweis</label>
        <label><input type="checkbox"> Führerschein</label>
        <label><input type="checkbox"> Geld</label>
        <label><input type="checkbox"> Reiseunterlagen</label>
        <label><input type="checkbox"> Brille</label>
        <label><input type="checkbox"> Handy</label>
        <label><input type="checkbox"> Reiseführer</label>
        <label><input type="checkbox"> Sonnenbrille</label>
        <label><input type="checkbox"> Kamera</label>
        <label><input type="checkbox"> Ladegeräte (Handy, Tablet)</label>
        <label><input type="checkbox"> Tablet</label>
        <label><input type="checkbox"> Kindle</label>
        <label><input type="checkbox"> Handtuch</label>
        <label><input type="checkbox"> Strandtuch</label>
        <label><input type="checkbox"> Strandtasche</label>
        <label><input type="checkbox"> Rucksack</label>
      </div>
      <div class="freitext-container" id="sonstiges-freitext"></div>
      <div class="buttons">
        <button onclick="addField('sonstiges-freitext')">+ Freitext</button>
      </div>
    </div>

  </div>

  <button onclick="generatePDF()">📤 Als PDF speichern</button>
  <button onclick="saveStateManually()">💾 Speichern</button>

  <script>
    function addField(containerId) {
      const container = document.getElementById(containerId);
      const wrapper = document.createElement("div");
      wrapper.className = "freitext-wrapper";
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "Freitext...";
      input.onchange = saveState;
      const removeBtn = document.createElement("button");
      removeBtn.textContent = "✖";
      removeBtn.onclick = () => {
        container.removeChild(wrapper);
        saveState();
      };
      wrapper.appendChild(input);
      wrapper.appendChild(removeBtn);
      container.appendChild(wrapper);
      saveState();
    }

    function generatePDF() {
      const element = document.getElementById("checklist");
      html2pdf().set({
        margin: 0.5,
        filename: 'Urlaubscheckliste.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, scrollY: 0 },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
      }).from(element).save();
    }

    function saveStateManually() {
      alert("Daten gespeichert.");
      saveState();
    }

    function saveState() {
      const state = {
        checkboxes: [...document.querySelectorAll('input[type="checkbox"]')].map(cb => cb.checked),
        freitexte: [...document.querySelectorAll('.freitext-container')].map(container =>
          [...container.querySelectorAll('input[type="text"]')].map(input => input.value)
        )
      };
      localStorage.setItem("checklist", JSON.stringify(state));
    }

    function loadState() {
      const state = JSON.parse(localStorage.getItem("checklist"));
      if (!state) return;
      document.querySelectorAll('input[type="checkbox"]').forEach((cb, i) => cb.checked = state.checkboxes[i]);
      const containers = document.querySelectorAll('.freitext-container');
      state.freitexte.forEach((texts, i) => {
        texts.forEach(text => {
          const wrapper = document.createElement("div");
          wrapper.className = "freitext-wrapper";
          const input = document.createElement("input");
          input.type = "text";
          input.value = text;
          input.onchange = saveState;
          const removeBtn = document.createElement("button");
          removeBtn.textContent = "✖";
          removeBtn.onclick = () => {
            containers[i].removeChild(wrapper);
            saveState();
          };
          wrapper.appendChild(input);
          wrapper.appendChild(removeBtn);
          containers[i].appendChild(wrapper);
        });
      });
    }

    window.onload = loadState;

    // Service Worker registrieren (macht die App offline-fähig & installierbar)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => {
          console.warn("Service Worker Registrierung fehlgeschlagen:", err);
        });
      });
    }
  </script>
</body>
</html>
