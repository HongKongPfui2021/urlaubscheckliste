<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kofferchecklisten</title>

  <!-- PWA: Manifest & Icons -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Koffer">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      background: #f0f0f0;
    }
    h1, h2 {
      color: #2c3e50;
    }
    .section {
      margin-bottom: 25px;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
      page-break-inside: avoid;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h2 {
      margin: 0;
    }
    .section-actions button {
      background: transparent;
      color: #2c3e50;
      padding: 4px 6px;
      margin: 0 0 0 4px;
      font-size: 1em;
    }
    .section-actions button:hover {
      background: #eee;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .checkbox-group label span {
      flex: 1;
    }
    .item-delete {
      background: transparent;
      color: #c0392b;
      padding: 2px 6px;
      margin: 0;
      font-size: 0.9em;
    }
    .item-delete:hover {
      background: #fdecea;
    }
    .buttons {
      margin-top: 10px;
    }
    button {
      padding: 8px 14px;
      margin-right: 5px;
      margin-top: 5px;
      border: none;
      background: #2c3e50;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #1a252f;
    }
    #add-section-btn {
      width: 100%;
      background: #ecf0f1;
      color: #2c3e50;
      border: 1px dashed #b0bec5;
    }
    #add-section-btn:hover {
      background: #dfe6e9;
    }

    /* Start-/Koffer-Auswahl */
    #start-screen {
      max-width: 500px;
      margin: 0 auto;
    }
    .profile-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      padding: 14px 16px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
      margin-bottom: 10px;
    }
    .profile-card .profile-name {
      flex: 1;
      font-size: 1.1em;
      font-weight: bold;
      color: #2c3e50;
      cursor: pointer;
      padding: 6px 0;
    }
    .profile-card .profile-actions button {
      background: transparent;
      color: #2c3e50;
      padding: 4px 8px;
      margin: 0 0 0 4px;
      font-size: 1.1em;
    }
    .profile-card .profile-actions button:hover {
      background: #eee;
    }
    #add-profile-btn {
      width: 100%;
      margin-top: 6px;
      background: #ecf0f1;
      color: #2c3e50;
      border: 1px dashed #b0bec5;
    }
    #add-profile-btn:hover {
      background: #dfe6e9;
    }
    #checklist-screen {
      display: none;
    }
    #checklist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    #back-btn {
      background: #7f8c8d;
    }
    #edit-toggle-btn.active {
      background: #16a085;
    }
    @media (max-width: 600px) {
      input[type="text"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- KOFFER-AUSWAHL -->
  <div id="start-screen">
    <h1>🧳 Wähle deinen Koffer</h1>
    <div id="profile-list"></div>
    <button id="add-profile-btn" onclick="addProfile()">➕ Neuer Koffer</button>
  </div>

  <!-- CHECKLISTE -->
  <div id="checklist-screen">
    <div id="checklist-header">
      <h1 id="checklist-title">🧳 Checkliste</h1>
      <div>
        <button id="edit-toggle-btn" onclick="toggleEditMode()">✏️ Bearbeiten</button>
        <button id="back-btn" onclick="goToStart()">← Zurück</button>
      </div>
    </div>

    <div id="checklist"></div>

    <button id="add-section-btn" onclick="addSection()" style="display:none;">➕ Neue Kategorie</button>

    <div class="buttons">
      <button onclick="generatePDF()">📤 Als PDF speichern</button>
    </div>
  </div>

  <script>
    const PROFILES_KEY = "koffer_profiles";
    let currentProfileId = null;
    let editMode = false;

    // ---------- Standard-Vorlage: feste Kategorien, aber ohne vorbefüllte Punkte ----------
    function defaultTemplate() {
      return {
        sections: [
          { id: uid("sec"), title: "Kosmetik", items: [] },
          { id: uid("sec"), title: "Reiseapotheke", items: [] },
          { id: uid("sec"), title: "Kleidung", items: [] },
          { id: uid("sec"), title: "Sonstiges", items: [] }
        ]
      };
    }

    // ---------- Profile (Koffer) ----------
    function defaultProfiles() {
      return [
        { id: "p1", name: "Koffer 1" },
        { id: "p2", name: "Koffer 2" },
        { id: "p3", name: "Koffer 3" }
      ];
    }

    function getProfiles() {
      const raw = localStorage.getItem(PROFILES_KEY);
      if (!raw) {
        const initial = defaultProfiles();
        localStorage.setItem(PROFILES_KEY, JSON.stringify(initial));
        // Für die drei Standard-Koffer direkt die Vorlage anlegen
        initial.forEach(p => {
          if (!localStorage.getItem("checklist_data_" + p.id)) {
            saveChecklistData(p.id, defaultTemplate());
          }
        });
        return initial;
      }
      return JSON.parse(raw);
    }

    function saveProfiles(profiles) {
      localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
    }

    function renderProfiles() {
      const profiles = getProfiles();
      const list = document.getElementById("profile-list");
      list.innerHTML = "";
      profiles.forEach(p => {
        const card = document.createElement("div");
        card.className = "profile-card";

        const nameSpan = document.createElement("div");
        nameSpan.className = "profile-name";
        nameSpan.textContent = "🧳 " + p.name;
        nameSpan.onclick = () => openProfile(p.id);

        const actions = document.createElement("div");
        actions.className = "profile-actions";

        const renameBtn = document.createElement("button");
        renameBtn.textContent = "✏️";
        renameBtn.onclick = (e) => { e.stopPropagation(); renameProfile(p.id); };

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "🗑️";
        deleteBtn.onclick = (e) => { e.stopPropagation(); deleteProfile(p.id); };

        actions.appendChild(renameBtn);
        actions.appendChild(deleteBtn);

        card.appendChild(nameSpan);
        card.appendChild(actions);
        list.appendChild(card);
      });
    }

    function addProfile() {
      const name = prompt("Name für den neuen Koffer:", "Neuer Koffer");
      if (!name) return;
      const profiles = getProfiles();
      const id = "p" + Date.now();
      profiles.push({ id, name });
      saveProfiles(profiles);
      saveChecklistData(id, defaultTemplate());
      renderProfiles();
    }

    function renameProfile(id) {
      const profiles = getProfiles();
      const profile = profiles.find(p => p.id === id);
      if (!profile) return;
      const newName = prompt("Neuer Name:", profile.name);
      if (!newName) return;
      profile.name = newName;
      saveProfiles(profiles);
      renderProfiles();
      if (currentProfileId === id) {
        document.getElementById("checklist-title").textContent = "🧳 " + newName;
      }
    }

    function deleteProfile(id) {
      const profiles = getProfiles();
      const profile = profiles.find(p => p.id === id);
      if (!profile) return;
      if (!confirm(`"${profile.name}" wirklich löschen? Die komplette Liste dafür geht verloren.`)) return;
      saveProfiles(profiles.filter(p => p.id !== id));
      localStorage.removeItem("checklist_data_" + id);
      renderProfiles();
    }

    // ---------- Checklisten-Daten pro Koffer ----------
    function getChecklistData(profileId) {
      const raw = localStorage.getItem("checklist_data_" + profileId);
      if (!raw) return { sections: [] };
      return JSON.parse(raw);
    }

    function saveChecklistData(profileId, data) {
      localStorage.setItem("checklist_data_" + profileId, JSON.stringify(data));
    }

    function uid(prefix) {
      return prefix + "_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
    }

    // ---------- Navigation ----------
    function openProfile(id) {
      const profiles = getProfiles();
      const profile = profiles.find(p => p.id === id);
      if (!profile) return;
      currentProfileId = id;
      editMode = false;
      updateEditToggleBtn();
      document.getElementById("checklist-title").textContent = "🧳 " + profile.name;
      renderChecklist();
      document.getElementById("start-screen").style.display = "none";
      document.getElementById("checklist-screen").style.display = "block";
    }

    function goToStart() {
      currentProfileId = null;
      document.getElementById("checklist-screen").style.display = "none";
      document.getElementById("start-screen").style.display = "block";
      renderProfiles();
    }

    function toggleEditMode() {
      editMode = !editMode;
      updateEditToggleBtn();
      renderChecklist();
    }

    function updateEditToggleBtn() {
      const btn = document.getElementById("edit-toggle-btn");
      btn.textContent = editMode ? "✅ Fertig" : "✏️ Bearbeiten";
      btn.classList.toggle("active", editMode);
      document.getElementById("add-section-btn").style.display = editMode ? "block" : "none";
    }

    // ---------- Rendern der Checkliste ----------
    function renderChecklist() {
      if (!currentProfileId) return;
      const data = getChecklistData(currentProfileId);
      const container = document.getElementById("checklist");
      container.innerHTML = "";

      data.sections.forEach(section => {
        const sectionEl = document.createElement("div");
        sectionEl.className = "section";

        const header = document.createElement("div");
        header.className = "section-header";

        const h2 = document.createElement("h2");
        h2.textContent = section.title;
        header.appendChild(h2);

        if (editMode) {
          const actions = document.createElement("div");
          actions.className = "section-actions";
          const renameBtn = document.createElement("button");
          renameBtn.textContent = "✏️";
          renameBtn.onclick = () => renameSection(section.id);
          const delBtn = document.createElement("button");
          delBtn.textContent = "🗑️";
          delBtn.onclick = () => removeSection(section.id);
          actions.appendChild(renameBtn);
          actions.appendChild(delBtn);
          header.appendChild(actions);
        }

        sectionEl.appendChild(header);

        const group = document.createElement("div");
        group.className = "checkbox-group";

        section.items.forEach(item => {
          const label = document.createElement("label");

          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = item.checked;
          cb.onchange = () => toggleItem(section.id, item.id, cb.checked);

          const span = document.createElement("span");
          span.textContent = item.name;

          label.appendChild(cb);
          label.appendChild(span);

          if (editMode) {
            const delBtn = document.createElement("button");
            delBtn.className = "item-delete";
            delBtn.textContent = "✖";
            delBtn.onclick = () => removeItem(section.id, item.id);
            label.appendChild(delBtn);
          }

          group.appendChild(label);
        });

        sectionEl.appendChild(group);

        if (editMode) {
          const btnRow = document.createElement("div");
          btnRow.className = "buttons";
          const addItemBtn = document.createElement("button");
          addItemBtn.textContent = "+ Punkt";
          addItemBtn.onclick = () => addItem(section.id);
          btnRow.appendChild(addItemBtn);
          sectionEl.appendChild(btnRow);
        }

        container.appendChild(sectionEl);
      });

      if (data.sections.length === 0) {
        const hint = document.createElement("p");
        hint.textContent = editMode
          ? "Noch keine Kategorien – leg unten eine neue an."
          : "Diese Liste ist noch leer. Tippe oben auf ✏️ Bearbeiten, um Kategorien und Punkte anzulegen.";
        container.appendChild(hint);
      }
    }

    // ---------- Bearbeiten: Kategorien & Punkte ----------
    function addSection() {
      const title = prompt("Name der neuen Kategorie:", "Neue Kategorie");
      if (!title) return;
      const data = getChecklistData(currentProfileId);
      data.sections.push({ id: uid("sec"), title, items: [] });
      saveChecklistData(currentProfileId, data);
      renderChecklist();
    }

    function renameSection(sectionId) {
      const data = getChecklistData(currentProfileId);
      const section = data.sections.find(s => s.id === sectionId);
      if (!section) return;
      const newTitle = prompt("Neuer Kategorie-Name:", section.title);
      if (!newTitle) return;
      section.title = newTitle;
      saveChecklistData(currentProfileId, data);
      renderChecklist();
    }

    function removeSection(sectionId) {
      const data = getChecklistData(currentProfileId);
      const section = data.sections.find(s => s.id === sectionId);
      if (!section) return;
      if (!confirm(`Kategorie "${section.title}" mit allen Punkten wirklich löschen?`)) return;
      data.sections = data.sections.filter(s => s.id !== sectionId);
      saveChecklistData(currentProfileId, data);
      renderChecklist();
    }

    function addItem(sectionId) {
      const name = prompt("Neuer Punkt:", "");
      if (!name) return;
      const data = getChecklistData(currentProfileId);
      const section = data.sections.find(s => s.id === sectionId);
      if (!section) return;
      section.items.push({ id: uid("item"), name, checked: false });
      saveChecklistData(currentProfileId, data);
      renderChecklist();
    }

    function removeItem(sectionId, itemId) {
      const data = getChecklistData(currentProfileId);
      const section = data.sections.find(s => s.id === sectionId);
      if (!section) return;
      section.items = section.items.filter(i => i.id !== itemId);
      saveChecklistData(currentProfileId, data);
      renderChecklist();
    }

    function toggleItem(sectionId, itemId, checked) {
      const data = getChecklistData(currentProfileId);
      const section = data.sections.find(s => s.id === sectionId);
      if (!section) return;
      const item = section.items.find(i => i.id === itemId);
      if (!item) return;
      item.checked = checked;
      saveChecklistData(currentProfileId, data);
    }

    // ---------- PDF-Export ----------
    function generatePDF() {
      const element = document.getElementById("checklist");
      const profiles = getProfiles();
      const profile = profiles.find(p => p.id === currentProfileId);
      const filename = (profile ? profile.name : "Checkliste") + ".pdf";
      html2pdf().set({
        margin: 0.5,
        filename: filename,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, scrollY: 0 },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
      }).from(element).save();
    }

    window.onload = renderProfiles;

    // Service Worker registrieren (macht die App offline-fähig & installierbar)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => {
          console.warn("Service Worker Registrierung fehlgeschlagen:", err);
        });
      });
    }
  </script>
</body>
</html>
